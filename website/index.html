<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queen Bees Restaurant — Authentic Zambian Cuisine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600;900&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES — Color System ===== */
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dark: #9A7A2E;
  --black: #070707;
  --dark: #0e0e0e;
  --dark2: #161616;
  --dark3: #1e1e1e;
  --cream: #F0EBE0;
  --text: #b0a898;
  --muted: #5a5650;
  --white: #ffffff;
}

/* ===== RESET ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  cursor: none;
}

/* ===== CUSTOM CURSOR ===== */
.cursor-dot {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  transition: transform 0.1s ease;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(201,168,76,0.5);
  border-radius: 50%;
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%,-50%);
  transition: all 0.18s ease;
}
body:hover .cursor-dot { opacity:1; }
a:hover ~ .cursor-ring, button:hover ~ .cursor-ring { transform: translate(-50%,-50%) scale(2); border-color: var(--gold); }

/* ===== NOISE TEXTURE OVERLAY — Atmosphere ===== */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9998;
}

/* ===== NAVIGATION ===== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 1.5rem 4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(24px);
  background: rgba(7,7,7,0.75);
  border-bottom: 1px solid rgba(201,168,76,0.08);
  transition: all 0.4s ease;
}
nav.scrolled {
  padding: 1rem 4rem;
  background: rgba(7,7,7,0.95);
}
.nav-logo {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 3px;
  text-decoration: none;
  text-transform: uppercase;
}
.nav-logo span {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  color: var(--cream);
  font-size: 0.85rem;
  display: block;
  letter-spacing: 5px;
  margin-top: -2px;
}
.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}
.nav-links a {
  color: var(--text);
  text-decoration: none;
  font-family: 'Jost', sans-serif;
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  position: relative;
  transition: color 0.3s ease;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.35s ease;
}
.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }
.nav-cta {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 0.6rem 1.8rem;
  font-family: 'Jost', sans-serif;
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: none;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: color 0.35s ease;
}
.nav-cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s ease;
  z-index: -1;
}
.nav-cta:hover { color: var(--black); }
.nav-cta:hover::before { transform: scaleX(1); }

/* Mobile nav toggle */
.nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: none; background: none; border: none; padding: 4px; }
.nav-toggle span { width: 24px; height: 1px; background: var(--gold); display: block; transition: all 0.3s ease; }

/* ===== HERO SECTION ===== */
.hero {
  min-height: 56vw;
  max-height: 680px;
  position: relative;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
}
.hero-bg-img {
  position: absolute; inset: 0;
  background-size: cover; background-position: center 30%;
  filter: brightness(0.38) contrast(1.1);
  transform: scale(1.03);
  transition: transform 10s ease;
}
.hero:hover .hero-bg-img { transform: scale(1); }
.hero-overlay {
  position: absolute; inset: 0;
  background:
    linear-gradient(0deg, var(--black) 0%, rgba(7,7,7,0.55) 50%, rgba(7,7,7,0.1) 100%),
    radial-gradient(ellipse at 30% 60%, rgba(201,168,76,0.06) 0%, transparent 55%);
}
.hero-grid {
  position: absolute; inset: 0; z-index: 1; overflow: hidden; opacity: 0.5;
}
.hero-grid::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);
  background-size: 80px 80px;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
  0% { transform: translate(0,0); }
  100% { transform: translate(80px, 80px); }
}
.hero-left {
  position: relative; z-index: 2;
  padding: 0 5rem 5rem;
  width: 100%; max-width: 750px;
}
.hero-eyebrow {
  font-family: 'Jost', sans-serif;
  font-size: 0.65rem; font-weight: 400;
  letter-spacing: 6px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 2rem;
  display: flex; align-items: center; gap: 1rem;
  }

.hero-eyebrow::before { content: ''; width: 40px; height: 1px; background: var(--gold); flex-shrink: 0; }
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 7vw, 7.5rem);
  font-weight: 300; line-height: 0.92; color: var(--cream);
  margin-bottom: 2.5rem;
}
.hero-title .queen { display: block; font-style: italic; color: var(--gold); font-weight: 600; }
.hero-title .bees { display: block; font-family: 'Cinzel', serif; font-style: normal; font-size: 0.55em; letter-spacing: 12px; color: var(--cream); font-weight: 400; padding-top: 0.3em; }
.hero-title .restaurant { display: block; font-size: 0.22em; letter-spacing: 8px; color: var(--muted); font-family: 'Jost', sans-serif; font-weight: 200; font-style: normal; padding-top: 0.8em; text-transform: uppercase; }
.hero-desc {
  font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 300;
  color: var(--text); line-height: 1.9; max-width: 380px;
  margin-bottom: 3rem; }

.hero-actions {
  display: flex; gap: 1.2rem; align-items: center; flex-wrap: wrap;
  }

.btn-primary {
  background: var(--gold); color: var(--black); padding: 1rem 2.5rem;
  font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase; text-decoration: none;
  cursor: none; transition: all 0.35s ease; position: relative; overflow: hidden;
}
.btn-primary::before { content: ''; position: absolute; inset: 0; background: var(--gold-light); transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease; z-index: -1; }
.btn-primary:hover { background: var(--gold-light); }
.btn-outline {
  background: transparent; border: 1px solid rgba(201,168,76,0.4); color: var(--cream);
  padding: 1rem 2.5rem; font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 400;
  letter-spacing: 3px; text-transform: uppercase; text-decoration: none;
  cursor: none; transition: all 0.35s ease; position: relative; overflow: hidden;
}
.btn-outline::before { content: ''; position: absolute; inset: 0; background: rgba(201,168,76,0.08); transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease; z-index: -1; }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-outline:hover::before { transform: scaleX(1); }
.hero-side-text {
  position: absolute; right: 3rem; top: 50%; transform: translateY(-50%) rotate(90deg);
  font-family: 'Jost', sans-serif; font-size: 0.55rem; font-weight: 200;
  letter-spacing: 5px; color: var(--muted); text-transform: uppercase;
  white-space: nowrap; z-index: 5;
}

</style>
</head>
